services:
  web:
    image: node:20.19.0-alpine
    working_dir: /workspace
    command: >
      sh -c "npm install &&
             npm run -w @thegame/web dev -- --hostname 0.0.0.0 --port 3000"
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      DATABASE_URL: postgresql://postgres:postgres@db:5432/twentyeight
    volumes:
      - ./:/workspace
      - /workspace/node_modules
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: twentyeight
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d twentyeight"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
